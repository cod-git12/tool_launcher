<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="css/checker.css">
    <script src="js/checker.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <title>Password Checker</title>
</head>

<body>
    <div class="header-nav">
        <button class="back-button" onclick="location.href='../index.html'">
            <i class="fas fa-arrow-left"></i> 戻る
        </button>
    </div>

    <div id="toast">クリップボードにコピーしました</div>

    <div class="container">
        <h1>Password Checker</h1>
        <p style="text-align: center; color: var(--text-light); margin-top: -1.5rem; margin-bottom: 2rem;">
            安全なパスワードかチェックします</p>

        <div class="input-box">
            <input type="password" id="pwInput" placeholder="入力または生成..." oninput="analyze()">
            <div class="controls">
                <button class="btn-icon" onclick="toggleView()" title="表示/非表示"><i class="fas fa-eye"></i></button>
                <button class="btn-icon" onclick="copy()" title="コピー"><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="meter-container">
            <div style="display:flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem;">
                <span id="strengthText" style="font-weight: bold;">Waiting...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="meter-track">
                <div id="meterFill"></div>
            </div>
        </div>

        <div class="analysis-grid">
            <div class="stat-card">
                <div class="stat-label">解読推定時間 (100兆回/秒)</div>
                <div id="crackTime" class="stat-value">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">情報量 (Entropy)</div>
                <div id="entropyVal" class="stat-value">0 bits</div>
            </div>
        </div>

        <ul id="feedbackList"></ul>

        <div class="generator-panel">
            <div style="flex: 1;">
                <span style="font-weight: bold; font-size: 0.9rem;">Smart Generator</span>
                <div style="font-size: 0.8rem; color: var(--text-light);">
                    長さ: <input type="number" id="genLen" value="16" min="8" max="64"
                        style="width: 40px; padding: 2px; margin: 0;">
                </div>
            </div>
            <button class="action-btn" onclick="generate()" style="width: auto; padding: 10px 20px;">生成</button>
        </div>
    </div>
</body>

</html>
