<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="tool/css/index.css">
    <script src="tool/js/index.js" defer></script>
    <title>Home | Tool launcher</title>
</head>

<body>
    <div class="container">
        <h1>ツールランチャー</h1>
        <div id="menu" class="content-section active">
            <div class="launcher">
                <div class="launcher-card" onclick="converter()">
                    <i class="fas fa-exchange-alt"></i>
                    <div class="card-content">
                        <span>単位変換ツール</span>
                        <p>単位を変換します</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="counter()">
                    <i class="fas fa-file-lines"></i>
                    <div class="card-content">
                        <span>文字数カウンター</span>
                        <p>文字数をカウントします</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="endecoder()">
                    <i class="fas fa-code"></i>
                    <div class="card-content">
                        <span>エンコーダー・デコーダー</span>
                        <p>文字をエンコード・デコードします</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="password()">
                    <i class="fas fa-shield-halved"></i>
                    <div class="card-content">
                        <span>パスワードチェッカー</span>
                        <p>パスワードの強度をチェックします</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="qrcode()">
                    <i class="fas fa-qrcode"></i>
                    <div class="card-content">
                        <span>QRコードリーダー</span>
                        <p>QRコードを読み取ります</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="tournament()">
                    <i class="fas fa-qrcode"></i>
                    <div class="card-content">
                        <span>トーナメントビルダー</span>
                        <p>トーナメントを作成します</p>
                    </div>
                </div>

                <div class="launcher-card" onclick="sourceviewer()">
                    <i class="fas fa-terminal"></i>
                    <div class="card-content">
                        <span>ソースビューアー</span>
                        <p>指定したurlのソースを見ることができます</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <p id="version">v1.6.1</p>
</body>

</html>
